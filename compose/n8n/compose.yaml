services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.14.1@sha256:f56b68d91a514f0a6cf6e638c1001bb46dc0b545db4d272c4f9e9c25b65dc416
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
