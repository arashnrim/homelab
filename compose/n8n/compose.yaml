services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.27.1@sha256:56f397bd9227d457fa868fd53ad11635dbd7c07182cc9b0e2abdedb0353fe53c
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
