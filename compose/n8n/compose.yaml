services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.11.0@sha256:303f1a1e41e2d58b7bd56a919cac743039e41b644771ee7af63b4e8dc78a2af3
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
