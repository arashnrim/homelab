services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.21.1@sha256:81310992ea0998ca0114d3909ef35fe4edcb5d92ec531aeb64909c698573f30d
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
