services:
  app:
    image: tomsquest/docker-radicale:3.7.2.0@sha256:df3ab2f20caac6ba9bc19ff6f7285a2ae64d9d430fd4e102f36a859c9e751953
    container_name: radicale-app
    ports:
      - 5232:5232
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - KILL
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 50
    healthcheck:
      test: curl -f http://127.0.0.1:5232 || exit 1
      interval: 30s
      retries: 3
    restart: unless-stopped
    volumes:
      - data:/data
      - /etc/radicale/config:/config:ro
    environment:
      - TAKE_FILE_OWNERSHIP=false

volumes:
  data:
