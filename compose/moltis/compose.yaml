services:
  app:
    image: ghcr.io/moltis-org/moltis:0.10.11@sha256:edc1c2975965c189d4d79614d7318551319e1bfdaab830a0c8f35cf42cd22429
    container_name: moltis-app
    restart: unless-stopped
    ports:
      - 13131:13131
      - 13132:13132
    volumes:
      - data:/home/moltis/.moltis
      - config:/home/moltis/.config/moltis
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  data:
  config:
