services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.27.0@sha256:a5b4217a14e852a782da69653fee1613d7b58aad5a08bb18a901d1c57ba8bb21
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
