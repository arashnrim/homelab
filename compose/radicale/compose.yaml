services:
  app:
    image: tomsquest/docker-radicale:3.7.1.0@sha256:2b9b6f468697c46cbd079d0d7a24e582b9dae7e6b9014c69522a555d5880dcf7
    container_name: radicale-app
    ports:
      - 5232:5232
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - KILL
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 50
    healthcheck:
      test: curl -f http://127.0.0.1:5232 || exit 1
      interval: 30s
      retries: 3
    restart: unless-stopped
    volumes:
      - data:/data
      - /etc/radicale/config:/config:ro
    environment:
      - TAKE_FILE_OWNERSHIP=false

volumes:
  data:
