services:
  app:
    image: ghcr.io/moltis-org/moltis:0.10.6@sha256:2bc044bfd3dddbcb440df12209b3824598030365ab07478ec1dc77b1d84b02c4
    container_name: moltis-app
    restart: unless-stopped
    ports:
      - 13131:13131
      - 13132:13132
    volumes:
      - data:/home/moltis/.moltis
      - config:/home/moltis/.config/moltis
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  data:
  config:
