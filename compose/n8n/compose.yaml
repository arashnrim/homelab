services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.25.4@sha256:5fd37fff98273a00c14f88d36b78a961f822e700801fa1b9509a7af643354531
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
