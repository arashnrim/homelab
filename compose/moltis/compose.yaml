services:
  app:
    image: ghcr.io/moltis-org/moltis:0.10.17@sha256:f13c9a0c584e29f739f1d7b22c914b19810e55afe3577bfcea427057cbb1bff3
    container_name: moltis-app
    restart: unless-stopped
    ports:
      - 13131:13131
      - 13132:13132
    volumes:
      - data:/home/moltis/.moltis
      - config:/home/moltis/.config/moltis
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  data:
  config:
