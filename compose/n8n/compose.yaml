services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.28.1@sha256:680e9668e600533d8aec04767057301508a2ae8f07e0346958ad73103103dab1
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
