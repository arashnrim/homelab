services:
  app:
    image: fireflyiii/core:version-6.4.9@sha256:5252c462d3c1ed337dc87482c95bc62c25153d2a71ab87aed1c7e67e4a85d850
    hostname: app
    container_name: firefly-app
    restart: always
    volumes:
      - upload:/var/www/html/storage/upload
    env_file: .env
    ports:
      - "9002:8080"
    depends_on:
      - db

  db:
    image: mariadb:11.8.8@sha256:be1ef4fe5f14589325c08a41c76334097ce66c86264b75e1d28342c742782a61
    hostname: db
    container_name: firefly-db
    restart: always
    env_file: .env
    volumes:
      - db:/var/lib/mysql

  # importer:
  #   image: fireflyiii/data-importer:version-1.9.1-cli
  #   hostname: importer
  #   restart: always
  #   container_name: firefly-importer
  #   ports:
  #     - "9003:8080"
  #   depends_on:
  #     - app
  #   env_file: .env

  cron:
    image: alpine:3.24.1@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    container_name: firefly-cron
    restart: always
    env_file: .env
    command: sh -c "
      apk add tzdata && \
      (ln -fs /usr/share/zoneinfo/$$TZ /etc/localtime || true) && \
      echo \"0 3 * * * wget -qO- http://app:8080/api/v1/cron/$$STATIC_CRON_TOKEN;echo\"
      | crontab - && \
      crond -f -L /dev/stdout"
    depends_on:
      - app

volumes:
  upload:
  db:
