services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.25.3@sha256:3dacc8d43fa736ecfc38582aa82e88212b65be484edac2396fcd7b3d2334d41f
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
