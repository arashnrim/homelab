services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.13.1@sha256:51dc2bee2e2f20493a86bd7db761e94c7f860c822716f15bc1d52c576ed25b90
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
