services:
  app:
    image: docker.n8n.io/n8nio/n8n:2.11.0@sha256:fd27ead55b0c98a8e8322b7995c08603ceb515068498840a34fbb46329f81fcc
    container_name: n8n-app
    restart: unless-stopped
    ports:
      - "9001:5678"
    env_file:
      - .env
    volumes:
      - data:/home/node/.n8n
      - files:/files

volumes:
  data:
  files:
