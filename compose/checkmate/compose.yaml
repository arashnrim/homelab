services:
  app:
    image: ghcr.io/bluewave-labs/checkmate-backend-mono:latest@sha256:c2e48634197f871f9c3c54de333b7600fd83b8c686e64ba460806a06b0706b53
    container_name: checkmate-app
    pull_policy: always
    restart: always
    ports:
      - "9009:52345"
    env_file: .env
    depends_on:
      - db

  db:
    image: ghcr.io/bluewave-labs/checkmate-mongo:latest@sha256:f6947013b737a96be73d22e5cfe61f0e4fdf38cb38652bf0b116257b74efbd94
    container_name: checkmate-db
    hostname: mongodb
    restart: always
    command: ["mongod", "--quiet", "--bind_ip_all"]
    volumes:
      - data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30

volumes:
  data:
