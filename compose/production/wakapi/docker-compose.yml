services:
  app:
    image: ghcr.io/muety/wakapi:2.17.0@sha256:c75fd26fb3265eb5325ac46ef7e0c954becdc76db3291f449840b7d04dfcec3a
    container_name: wakapi-app
    restart: unless-stopped
    ports:
      - 9008:3000
    env_file: stack.env

  db:
    image: postgres:18@sha256:bfe50b2b0ddd9b55eadedd066fe24c7c6fe06626185b73358c480ea37868024d
    container_name: wakapi-db
    restart: unless-stopped
    env_file: stack.env
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
